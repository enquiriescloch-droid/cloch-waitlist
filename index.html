<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clóch — Early Access</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 38px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .urgency {
      font-size: 12px;
      color: #888;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #333;
      background: #111;
      color: white;
      font-size: 14px;
      border-radius: 6px;
      text-align: center;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      background: white;
      color: black;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      text-align: center;
      font-weight: 500;
    }

    button:hover {
      opacity: 0.85;
    }

    .small {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Clóch</h1>
    <div class="sub">Designed differently. Built with intent.</div>
    <div class="urgency">Join early access to the first release.</div>

    <form action="https://formspree.io/f/xwvaekvw" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required />
      <button type="submit">Get Early Access</button>
    </form>

    <div class="small">
      First release. No restocks.
    </div>
  </div>
</body>
</html>
