<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clóch — First Release</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #0f0f0f;
  color: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  text-align: center;
  max-width: 500px;
  width: 100%;
}

h1 {
  font-size: 36px;
  font-weight: 500;
  margin-bottom: 6px;
}

.sub {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 25px;
}

.gallery {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 25px;
}

.gallery img {
  width: 30%;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
  font-size: 14px;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  background: white;
  color: black;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  opacity: 0.85;
}

.small {
  margin-top: 15px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

  <h1>Clóch</h1>
  <div class="sub">First release. Limited access.</div>

  <!-- PRODUCT IMAGES -->
  <div class="gallery">
    <img src="moss.png" alt="Moss Hat">
    <img src="stone.png" alt="Stone Hat">
    <img src="basalt.png" alt="Basalt Hat">
  </div>

  <!-- FORM -->
  <form action="https://formspree.io/f/xwvaekvw" method="POST">

    <input type="text" name="name" placeholder="Full name" required>

    <input type="email" name="email" placeholder="Email address" required>

    <input type="text" name="country" placeholder="Country" required>

    <select name="colour" required>
      <option value="">Preferred colour</option>
      <option value="Moss">Moss</option>
      <option value="Stone">Stone</option>
      <option value="Basalt">Basalt</option>
    </select>

    <button type="submit">Request Access</button>

  </form>

  <div class="small">
    Refined essentials. Built with intent.
  </div>

</div>

</body>
</html>
