<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clóch — First Release</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #0f0f0f;
  color: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  text-align: center;
  max-width: 520px;
  width: 100%;
}

h1 {
  font-size: 38px;
  font-weight: 500;
  margin-bottom: 6px;
}

.sub {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 20px;
}

.urgency {
  font-size: 12px;
  color: #888;
  margin-bottom: 15px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
  font-size: 14px;
  border-radius: 6px;
  text-align: center;
}

/* SELECT WRAPPER */
.select-wrapper {
  position: relative;
  margin-bottom: 10px;
}

/* DROPDOWN */
select {
  width: 100%;
  padding: 14px 40px; /* space for arrow */
  border: 1px solid #333;
  background: #111;
  color: white;
  font-size: 14px;
  border-radius: 6px;

  text-align: center;
  text-align-last: center;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

/* CUSTOM ARROW */
.select-wrapper::after {
  content: "▾";
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
  pointer-events: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  background: white;
  color: black;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
  text-align: center;
  font-weight: 500;
}

button:hover {
  opacity: 0.85;
}

.small {
  margin-top: 15px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

  <h1>Clóch</h1>

  <div class="sub">First release. No restocks.</div>
  <div class="urgency">Be first. Limited release.</div>

  <form action="https://formspree.io/f/xwvaekvw" method="POST">

    <input type="text" name="name" placeholder="Name (optional)">

    <input type="email" name="email" placeholder="Email" required>

    <input type="text" name="country" placeholder="Country (optional)">

    <!-- COLOUR DROPDOWN -->
    <div class="select-wrapper">
      <select name="colour" required>
        <option value="" disabled selected>Preferred colour</option>
        <option value="Moss">Moss</option>
        <option value="Stone">Stone</option>
        <option value="Basalt">Basalt</option>
      </select>
    </div>

    <button type="submit">Get Early Access</button>

  </form>

  <div class="small">
    Refined essentials. Built with intent.
  </div>

</div>

</body>
</html>
