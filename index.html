<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clóch — First Release</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #111111;
      color: #f4efe6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: #171717;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }

    .image-side {
      background: #1a1a1a;
      min-height: 620px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .image-side img {
      width: 100%;
      max-width: 520px;
      height: auto;
      display: block;
      border-radius: 18px;
      object-fit: cover;
    }

    .content-side {
      background: #f3ede2;
      color: #171717;
      padding: 56px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(23,23,23,0.55);
      margin-bottom: 14px;
    }

    h1 {
      font-size: 34px;
      line-height: 1.05;
      margin: 0 0 14px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 28px;
      color: rgba(23,23,23,0.68);
      font-size: 15px;
      line-height: 1.6;
      max-width: 360px;
    }

    form {
      width: 100%;
      max-width: 360px;
    }

    input[type="email"] {
      width: 100%;
      padding: 16px 18px;
      font-size: 15px;
      border-radius: 14px;
      border: 1px solid rgba(23,23,23,0.12);
      background: #ffffff;
      color: #171717;
      outline: none;
      margin-bottom: 12px;
    }

    input[type="email"]:focus {
      border-color: rgba(23,23,23,0.35);
    }

    button {
      width: 100%;
      padding: 16px 18px;
      border: none;
      border-radius: 14px;
      background: #171717;
      color: #f3ede2;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .micro {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(23,23,23,0.48);
      line-height: 1.5;
      max-width: 360px;
    }

    .palette {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(23,23,23,0.1);
      color: rgba(23,23,23,0.72);
      background: rgba(255,255,255,0.55);
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .image-side {
        min-height: auto;
        padding: 20px 20px 0;
      }

      .content-side {
        padding: 34px 22px 30px;
      }

      .brand {
        font-size: 34px;
      }

      h1 {
        font-size: 28px;
      }

      p, form, .micro {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="image-side">
      <img src="https://images.unsplash.com/photo-1521369909029-2afed882baee?auto=format&fit=crop&w=1200&q=80" alt="Clóch cap preview" />
    </div>

    <div class="content-side">
      <div class="brand">Clóch</div>
      <div class="eyebrow">First Release</div>
      <h1>Refined headwear. Limited early access.</h1>
      <p>
        Join the list for first access to the opening Clóch release.
        Built with intent. Released in limited quantity.
      </p>

      <form action="https://formspree.io/f/xwvaekvw" method="POST">
        <input type="email" name="email" placeholder="Enter your email" required />
        <button type="submit">Request Access</button>
      </form>

      <div class="micro">
        No noise. No unnecessary emails. Early access only.
      </div>

      <div class="palette">
        <div class="chip">Moss</div>
        <div class="chip">Stone</div>
        <div class="chip">Basalt</div>
      </div>
    </div>
  </div>
</body>
</html>
