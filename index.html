<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clóch — First Release</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #0f0f0f;
  color: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  text-align: center;
  max-width: 520px;
  width: 100%;
}

h1 {
  font-size: 38px;
  font-weight: 500;
  margin-bottom: 6px;
}

/* STRONGER HEADLINE */
.sub {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 20px;
}

/* PSYCHOLOGICAL TRIGGER */
.urgency {
  font-size: 12px;
  color: #888;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
  font-size: 14px;
  border-radius: 6px;
}

/* CENTER DROPDOWN TEXT */
select {
  text-align: center;
  text-align-last: center;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  background: white;
  color: black;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
  text-align: center;
  font-weight: 500;
}

button:hover {
  opacity: 0.85;
}

.small {
  margin-top: 15px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

  <h1>Clóch</h1>

  <!-- UPDATED HEADLINE -->
  <div class="sub">First release. No restocks.</div>

  <!-- URGENCY LINE -->
  <div class="urgency">Be first. Limited release.</div>

  <form action="https://formspree.io/f/xwvaekvw" method="POST">

    <!-- OPTIONAL NAME -->
    <input type="text" name="name" placeholder="Full name (optional)">

    <!-- REQUIRED EMAIL -->
    <input type="email" name="email" placeholder="Email address" required>

    <!-- OPTIONAL COUNTRY -->
    <input type="text" name="country" placeholder="Country (optional)">

    <!-- REQUIRED COLOUR -->
    <select name="colour" required>
      <option value="" disabled selected>Preferred colour</option>
      <option value="Moss">Moss</option>
      <option value="Stone">Stone</option>
      <option value="Basalt">Basalt</option>
    </select>

    <!-- STRONGER CTA -->
    <button type="submit">Get Early Access</button>

  </form>

  <div class="small">
    Refined essentials. Built with intent.
  </div>

</div>

</body>
</html>
